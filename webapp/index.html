<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner - Hyderabad to Kerala</title>
    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ui.core, sap.ui.layout, sap.f, sap.ui.unified"
        data-sap-ui-resourceroots='{
            "com.roshan.tripplanner": "./"
        }'
        data-sap-ui-oninit="module:com/roshan/tripplanner/index"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="com.roshan.tripplanner"
         data-id="container"
         data-settings='{"id" : "tripplanner"}'>
    </div>
</body>
</html>
